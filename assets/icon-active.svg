  <path d="M68 38 L50 64 L68 90" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow (publish/send) -->
  <path d="M78 56 L94 40 L94 54" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M94 40 L80 40" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Underline accent -->
